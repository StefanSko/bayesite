name: conformance

# Cross-engine agreement is a validation-time concern, not part of the shipped
# binary. Run it on a schedule and before release tags so drift is visible
# without adding Python/JAX/nuts-rs to the agent execution path.
on:
  schedule:
    - cron: "37 4 * * *"
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nuts-rs-oracle:
    name: NUTS cross-engine oracle (nuts-rs)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Read pinned nuts-rs revision
        shell: bash
        run: echo "NUTS_RS_REV=$(cat NUTS_RS_REV)" >> "$GITHUB_ENV"

      - name: Fetch pinned nuts-rs oracle
        shell: bash
        run: |
          set -euo pipefail
          git init /tmp/nuts-rs
          git -C /tmp/nuts-rs remote add origin https://github.com/pymc-devs/nuts-rs
          git -C /tmp/nuts-rs fetch --depth=1 origin "$NUTS_RS_REV"
          git -C /tmp/nuts-rs checkout --detach FETCH_HEAD

      - name: Run NUTS cross-engine oracle (nuts-rs)
        shell: bash
        run: >-
          python3 scripts/check_nuts_rs_oracle.py
          --nuts-rs-path /tmp/nuts-rs
          --report nuts-rs-oracle-report.html

      - name: Upload nuts-rs oracle report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nuts-rs-oracle-report
          path: nuts-rs-oracle-report.html
          retention-days: 14

  posterior-oracle:
    name: Posterior cross-backend oracle (bayesjax)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          path: bayesite

      - uses: astral-sh/setup-uv@v5

      - name: Run posterior cross-backend oracle (bayesjax)
        working-directory: bayesite
        shell: bash
        run: uv run scripts/check_rust_backend_posterior.py

  sbc-calibration:
    name: SBC calibration (rank uniformity)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release CLI
        shell: bash
        run: >-
          cargo build --release --locked --bin bayesite
          --manifest-path crates/core/Cargo.toml

      - name: Run SBC calibration (rank uniformity)
        shell: bash
        run: >-
          python3 scripts/check_sbc_uniformity.py
          --replicates 2000
          --report sbc-calibration-report.html

      - name: Upload SBC calibration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbc-calibration-report
          path: sbc-calibration-report.html
          retention-days: 14

  conformance-summary:
    name: Conformance summary
    needs: [nuts-rs-oracle, posterior-oracle, sbc-calibration]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download per-gate reports
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          path: reports/

      - name: Render conformance summary
        shell: bash
        run: >-
          python3 scripts/conformance_summary.py
          --stage "NUTS cross-engine oracle (nuts-rs)=${{ needs.nuts-rs-oracle.result }}"
          --stage "Posterior cross-backend oracle (bayesjax)=${{ needs.posterior-oracle.result }}"
          --stage "SBC calibration (rank uniformity)=${{ needs.sbc-calibration.result }}"
          --reports-dir reports/
          --report conformance-summary.html
          --step-summary "$GITHUB_STEP_SUMMARY"

      - name: Upload conformance summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-summary
          path: conformance-summary.html
          retention-days: 14
