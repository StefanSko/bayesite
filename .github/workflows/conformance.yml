name: conformance

# Cross-engine agreement is a validation-time concern, not part of the shipped
# binary. Run it on a schedule and before release tags so drift is visible
# without adding Python/JAX/nuts-rs to the agent execution path.
on:
  schedule:
    - cron: "37 4 * * *"
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nuts-rs-oracle:
    name: G6 nuts-rs oracle
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Read pinned nuts-rs revision
        shell: bash
        run: echo "NUTS_RS_REV=$(cat NUTS_RS_REV)" >> "$GITHUB_ENV"

      - name: Fetch pinned nuts-rs oracle
        shell: bash
        run: |
          set -euo pipefail
          git init /tmp/nuts-rs
          git -C /tmp/nuts-rs remote add origin https://github.com/pymc-devs/nuts-rs
          git -C /tmp/nuts-rs fetch --depth=1 origin "$NUTS_RS_REV"
          git -C /tmp/nuts-rs checkout --detach FETCH_HEAD

      - name: Run G6 independent NUTS oracle
        shell: bash
        run: >-
          python3 scripts/check_nuts_rs_oracle.py
          --nuts-rs-path /tmp/nuts-rs
          --report g6-report.html

      - name: Upload G6 oracle report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: g6-oracle-report
          path: g6-report.html
          retention-days: 14

  posterior-oracle:
    name: G7 bayesjax posterior oracle
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          path: bayesite

      - uses: astral-sh/setup-uv@v5

      - name: Run G7 cross-backend posterior oracle
        working-directory: bayesite
        shell: bash
        run: uv run scripts/check_rust_backend_posterior.py

  sbc-uniformity:
    name: G11 SBC rank uniformity
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release CLI
        shell: bash
        run: >-
          cargo build --release --locked --bin bayesite
          --manifest-path crates/core/Cargo.toml

      - name: Run G11 SBC rank uniformity
        shell: bash
        run: >-
          python3 scripts/check_sbc_uniformity.py
          --replicates 2000
          --report g11-sbc-report.html

      - name: Upload G11 SBC report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: g11-sbc-report
          path: g11-sbc-report.html
          retention-days: 14
